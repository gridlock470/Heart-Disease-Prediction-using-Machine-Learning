{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12 px-4 anim-fade-up">
    <div class="glass rounded-3xl p-8 border border-slate-700/30 relative overflow-hidden shadow-2xl">
        
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-rose-500 via-pink-500 to-blue-500"></div>
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-rose-500/20 to-blue-500/20 border border-rose-500/20 flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <h2 class="text-3xl font-bold mb-2">Reset Password</h2>
            <p class="text-slate-500 text-sm">Enter the code from your email and your new password</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password') }}" class="space-y-5">
            <div class="anim-fade-up delay-1">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                <input type="email" name="email" required placeholder="you@example.com" class="input-field">
            </div>
            <div class="anim-fade-up delay-2">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Reset Code</label>
                <input type="text" name="code" required placeholder="123456" class="input-field" maxlength="6">
            </div>
            <div class="anim-fade-up delay-3">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">New Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="input-field">
            </div>
            <div class="anim-fade-up delay-4">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Confirm New Password</label>
                <input type="password" name="confirm_password" required placeholder="••••••••" class="input-field">
            </div>
            <button type="submit" class="w-full btn-rose text-center mt-6 anim-fade-up delay-5">
                Reset Password
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-500 anim-fade-up delay-6">
            Remember your password? 
            <a href="{{ url_for('login') }}" class="text-rose-400 hover:text-rose-300 font-medium transition">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
